<div class="app-shell">
  <header class="app-topbar">
    <a class="brand-link" routerLink="/dashboard" aria-label="TaskTracker">
      <app-logo [size]="34" [showText]="true" [onDark]="theme.isDark()" />
    </a>

    <nav class="top-nav" aria-label="Navegación principal">
      @for (item of navItems; track item.route) {
        <a mat-button
           [routerLink]="item.route"
           class="nav-link"
           routerLinkActive="active-link"
           [routerLinkActiveOptions]="{ exact: false }">
          <mat-icon>{{ item.icon }}</mat-icon>
          <span>{{ item.label }}</span>
        </a>
      }
    </nav>

    <div class="topbar-actions">
      <button mat-icon-button
              class="theme-toggle"
              (click)="theme.toggle()"
              [matTooltip]="theme.isDark() ? 'Modo claro' : 'Modo oscuro'">
        <mat-icon>{{ theme.isDark() ? 'light_mode' : 'dark_mode' }}</mat-icon>
      </button>
    </div>
  </header>

  <main class="content-area" [class.tasks-route]="isTasksRoute()">
    <router-outlet />
  </main>
</div>
