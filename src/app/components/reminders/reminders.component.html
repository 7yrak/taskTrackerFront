<div class="page-container" style="padding: 24px;">
  <div class="page-header" style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px;">
    <h1 style="margin: 0; font-size: 24px; color: #1E293B;">Recordatorios</h1>
    <button mat-flat-button color="primary" (click)="openCreate()">
      <mat-icon>add</mat-icon> Nuevo Recordatorio
    </button>
  </div>

  <table mat-table [dataSource]="reminders()" class="mat-elevation-z2" style="width: 100%;">
    <ng-container matColumnDef="title">
      <th mat-header-cell *matHeaderCellDef> Título </th>
      <td mat-cell *matCellDef="let r"> {{r.title}} </td>
    </ng-container>

    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef> Estado </th>
      <td mat-cell *matCellDef="let r">
        <span class="status-chip {{r.status}}">{{getStatusLabel(r.status)}}</span>
      </td>
    </ng-container>

    <ng-container matColumnDef="startDate">
      <th mat-header-cell *matHeaderCellDef> Fecha Inicio </th>
      <td mat-cell *matCellDef="let r"> {{r.startDate | date:'dd/MM/yy'}} </td>
    </ng-container>

    <ng-container matColumnDef="dueDate">
      <th mat-header-cell *matHeaderCellDef> Fecha Vencimiento </th>
      <td mat-cell *matCellDef="let r"> {{r.dueDate | date:'dd/MM/yy'}} </td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef> Acciones </th>
      <td mat-cell *matCellDef="let r">
        <button mat-icon-button color="primary" (click)="openEdit(r)">
          <mat-icon>edit</mat-icon>
        </button>
        <button mat-icon-button color="warn" (click)="delete(r.id)">
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>
</div>
